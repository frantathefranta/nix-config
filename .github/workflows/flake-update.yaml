---
name: Update Flake Inputs

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update-flake-inputs:
    runs-on: ubuntu
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      # - name: Generate GitHub App Token
      #   id: app-token
      #   uses: https://github.com/actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      #   with:
      #     app-id: ${{ secrets.BOT_APP_ID }}
      #     private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      #     owner: "frantathefranta"
      #     repositories: ""

      - name: Checkout repository
        uses: https://code.forgejo.org/actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # with:
        #   token: ${{ secrets.RO_GITHUB_TOKEN }}

      - uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: ~/.cache/nix
          key: nix-${{ hashFiles('flake.lock') }}
          restore-keys: nix-

      - name: Install nix
        uses: https://github.com/DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update flake inputs
        uses: https://github.com/mic92/update-flake-inputs-gitea@34c7f47a6f4b49c26523e003c40fc49aafa5c1e1
        with:
          gitea-token: ${{ secrets.GITEA_TOKEN }}
          github-token: ${{ secrets.RO_GITHUB_TOKEN }}
          git-author-name: "lordoflightning-bot"
          git-author-email: "lol@franta.us"
          git-committer-name: "lordoflightning-bot"
          git-committer-email: "lol@franta.us"
          auto-merge: 'false'
          delete-branch: 'true'
