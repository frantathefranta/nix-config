---
name: Update Flake Inputs

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update-flake-inputs:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3.1.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update flake inputs
        uses: mic92/update-flake-inputs@1e056167bd2101e587bd39deb2f64909b4759652 # v1.0.4
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          git-author-name: "lord-of-lightning-bot[bot]"
          git-author-email: "170540725+lord-of-lightning-bot[bot]@users.noreply.github.com"
          git-committer-name: "lord-of-lightning-bot[bot]"
          git-committer-email: "170540725+lord-of-lightning-bot[bot]@users.noreply.github.com"
          auto-merge: 'false'
          delete-branch: 'true'
