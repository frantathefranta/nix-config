---
name: Update Flake Inputs

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  update-flake-inputs:
    runs-on: ubuntu
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: https://github.com/actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          owner: frantathefranta
          github-api-url: https://api.github.com
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: https://code.forgejo.org/actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: https://code.forgejo.org/actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/nix
          key: nix-${{ hashFiles('flake.lock') }}
          restore-keys: nix-

      - name: Configure git identity
        run: |
          git config --global user.email "lol@franta.us"
          git config --global user.name "lordoflightning-bot"
          git config --global init.defaultBranch main

      - name: Install nix
        uses: https://github.com/DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update flake inputs
        uses: https://github.com/mfenniak/update-flake-inputs-forgejo@b5614c72bdce961524fe3ca2daad7de2d2d8f46f
        with:
          # gitea-token: ${{ secrets.GITEA_TOKEN }}
          forgejo-token: ${{ secrets.BOT_FORGEJO_TOKEN }}
          github-token: ${{ steps.app-token.outputs.token }}
          git-author-name: "lordoflightning-bot"
          git-author-email: "lol@franta.us"
          git-committer-name: "lordoflightning-bot"
          git-committer-email: "lol@franta.us"
          auto-merge: 'true'
          delete-branch: 'true'
