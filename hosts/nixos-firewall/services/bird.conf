log stderr all;

define OWNAS =  65000;
define OWNIP =  10.0.0.1;
define OWNIPv6 = 2600:1702:6630:3fea::1;
router id OWNIP;

# Device protocol gets information about interfaces (to be used in Direct protocol)
protocol device device1 {
  scan time 10;
}

# Direct protocol imports directly connected routes (to be used in Kernel protocol)
protocol direct direct1 {
  interface "lo";
  interface "lan0*";
  # interface "lan0*", "wan0";
  ipv4;
  ipv6;
}

function is_anycast_ipv4 () -> bool {
  return net ~ [
  10.0.0.0/24{32,32}
  ];
}

function is_anycast_ipv6 () -> bool {
  return net ~ [
  2600:1702:6630:3fea::/64{128,128}
  ];
}
protocol kernel kernel_v4 {
  ipv4 {
    # import FROM the kernel
    import all;
    # export INTO the kernel
    export filter {
      if source = RTS_BGP then {
        if is_anycast_ipv4() then krt_prefsrc = OWNIP;
        accept;
      }
      reject;
    };
  };
}

protocol kernel kernel_v6 {
  ipv6 {
    import all;
    export filter {
      if source = RTS_BGP then {
        krt_prefsrc = OWNIPv6;
        accept;
      }
      reject;
    };
  };
}

protocol bgp arista {
  neighbor fe80::464c:a8ff:fede:3cf7%lan0 as 65033;
  local as OWNAS;
  ipv4 {
    extended next hop on;
    next hop self;
    import all;
    export all;
  };
  ipv6 {
    extended next hop on;
    next hop self;
    import all;
    export all;
  };
}

protocol bgp mikrotik {
  neighbor fe80::1%wg_mikrotik as 65534;
  local as OWNAS;
  ipv4 {
    extended next hop on;
    next hop self;
    import all;
    export none;
  };
  ipv6 {
    extended next hop on;
    next hop self;
    import all;
    export filter { if is_anycast_ipv6() then accept; reject;};
  };
}
